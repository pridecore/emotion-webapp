<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обери психолога</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(to bottom, #f0f4f8, #ffffff);
      color: #2c3e50;
      padding: 0 12px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding-top: 24px;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 14px;
      color: #555;
      opacity: 0.8;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      padding: 16px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
    }

    .card:hover {
      transform: scale(1.015);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 16px;
      border: 2px solid #e3e6ec;
    }

    .info {
      flex: 1;
    }

    .info h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      margin-bottom: 6px;
      color: #1f1f1f;
    }

    .info p {
      margin: 0;
      font-size: 14px;
      color: #666;
      line-height: 1.4;
    }

    .no-data {
      text-align: center;
      padding: 40px 10px;
      font-size: 16px;
      color: #888;
    }

    @media (max-width: 480px) {
      .avatar {
        width: 64px;
        height: 64px;
      }

      .info h2 {
        font-size: 16px;
      }

      .info p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Обери свого психолога</h1>
      <p>Знайди того, хто підходить саме тобі</p>
    </div>

    <div id="psychologist-list">Завантаження...</div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const allowedLogins = urlParams.get("logins")?.split(",") || [];

    const psychologists = [
      {
        fullname: "Олена Іванова",
        photo: "https://pridecore.github.io/emotion-webapp/Emotion/img/1.jpeg",
        price: 1000,
        city: "Онлайн",
        formats: "індивідуально, підлітки",
        login: "ivanova"
      },
      {
        fullname: "Сергій Петренко",
        photo: "https://pridecore.github.io/emotion-webapp/Emotion/img/2.jpeg",
        price: 900,
        city: "Онлайн",
        formats: "індивідуально, діти",
        login: "petrenko"
      }
    ];

    const filtered = psychologists.filter(p => allowedLogins.includes(p.login));
    const list = document.getElementById("psychologist-list");
    list.innerHTML = "";

    if (filtered.length === 0) {
      list.innerHTML = "<div class='no-data'>Немає фахівців за обраними напрямами 😔</div>";
    } else {
      filtered.forEach(psy => {
        const card = document.createElement("div");
        card.className = "card";
        card.onclick = () => {
          const data = JSON.stringify({ login: psy.login });
          setTimeout(() => {
            Telegram.WebApp.sendData(data);
          }, 150);
        };

        card.innerHTML = `
          <img src="${psy.photo}" alt="${psy.fullname}" class="avatar" />
          <div class="info">
            <h2>${psy.fullname}</h2>
            <p>💵 ${psy.price} грн | 📍 ${psy.city}<br>👥 ${psy.formats}</p>
          </div>
        `;

        list.appendChild(card);
      });
    }
  </script>
</body>
</html>
