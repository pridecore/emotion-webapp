<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обери психолога</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #f2f4f8;
    }

    .psychologist-list {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .psychologist-card {
      display: flex;
      align-items: center;
      background-color: #ffffff;
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 18px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.04);
      transition: transform 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .psychologist-card:hover {
      background-color: #f0f4ff;
      transform: translateY(-2px);
    }

    .psychologist-card__avatar {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      object-fit: cover;
      margin-right: 16px;
      flex-shrink: 0;
      border: 2px solid #e0e0e0;
    }

    .psychologist-card__info {
      flex: 1;
    }

    .psychologist-card__name {
      font-weight: 600;
      font-size: 18px;
      margin-bottom: 4px;
      color: #1e1e1e;
    }

    .psychologist-card__detail {
      font-size: 14px;
      color: #5a5a5a;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .psychologist-card__avatar {
        width: 56px;
        height: 56px;
      }
      .psychologist-card__name {
        font-size: 16px;
      }
      .psychologist-card__detail {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="psychologist-list" id="psychologist-list">
    <!-- Карточки згенеруються тут -->
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const psychologists = [
      {
        fullname: "Олена Іванова",
        photo: "https://pridecore.github.io/emotion-webapp/img/1.jpg",
        price: 1000,
        city: "Онлайн",
        formats: "індивідуально, підлітки",
        login: "ivanova"
      },
      {
        fullname: "Сергій Петренко",
        photo: "https://pridecore.github.io/emotion-webapp/img/2.jpg",
        price: 900,
        city: "Онлайн",
        formats: "індивідуально, діти",
        login: "petrenko"
      }
    ];

    const listContainer = document.getElementById('psychologist-list');

    psychologists.forEach(psychologist => {
      const card = document.createElement('div');
      card.className = 'psychologist-card';
      card.onclick = () => {
        Telegram.WebApp.sendData(JSON.stringify({ login: psychologist.login }));
      };

      card.innerHTML = `
        <img src="${psychologist.photo}" alt="${psychologist.fullname}" class="psychologist-card__avatar" />
        <div class="psychologist-card__info">
          <div class="psychologist-card__name">${psychologist.fullname}</div>
          <div class="psychologist-card__detail">💵 ${psychologist.price} грн | 📍 ${psychologist.city}</div>
          <div class="psychologist-card__detail">👥 ${psychologist.formats}</div>
        </div>
      `;

      listContainer.appendChild(card);
    });
  </script>
</body>
</html>
