<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Обери психолога</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
        }

        .psychologist-list {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .psychologist-card {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .psychologist-card:hover {
            background-color: #f0f0f0;
        }

        .psychologist-card__avatar {
            width: 72px;
            height: 72px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .psychologist-card__info {
            flex: 1;
        }

        .psychologist-card__name {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 6px;
            color: #222;
        }

        .psychologist-card__detail {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }

        @media (max-width: 480px) {
            .psychologist-card__name {
                font-size: 16px;
            }
            .psychologist-card__detail {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="psychologist-list" id="psychologist-list"></div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const psychologists = [
            {
                fullname: "Олена Іванова",
                photo: "https://pridecore.github.io/emotion-webapp/Emotion/img/1.jpeg",
                price: "1000",
                city: "Онлайн",
                formats: "індивідуально, підлітки",
                login: "ivanova"
            },
            {
                fullname: "Сергій Петренко",
                photo: "https://pridecore.github.io/emotion-webapp/Emotion/img/2.jpeg",
                price: "900",
                city: "Онлайн",
                formats: "індивідуально, діти",
                login: "petrenko"
            }
        ];

        const list = document.getElementById("psychologist-list");

        psychologists.forEach((psy) => {
            const card = document.createElement("div");
            card.className = "psychologist-card";
            card.onclick = () => {
                Telegram.WebApp.sendData(JSON.stringify({ login: psy.login }));
                Telegram.WebApp.close();
            };

            card.innerHTML = `
                <img src="${psy.photo}" alt="${psy.fullname}" class="psychologist-card__avatar" />
                <div class="psychologist-card__info">
                    <div class="psychologist-card__name">${psy.fullname}</div>
                    <div class="psychologist-card__detail">💵 ${psy.price} грн | 📍 ${psy.city}</div>
                    <div class="psychologist-card__detail">👥 ${psy.formats}</div>
                </div>
            `;

            list.appendChild(card);
        });
    </script>
</body>
</html>
